    <!-- Formulario -->
    <main>
        <form class="formulario-contacto">
            <fieldset>
                <legend>Llena los siguientes campos para contactarnos</legend>
                <div class="contenedor-formulario">
                    <div class="nombre">
                        <label>Nombre</label>
                        <input class="input-text" type="text" placeholder="Nombre">
                    </div>

                    <div class="apellido">
                        <label>Apellido</label>
                        <input class="input-text" type="text" placeholder="Apellido">
                    </div>

                    <div class="correo">
                        <label>Correo</label>
                        <input class="input-text" type="email" placeholder="Email">
                    </div>
                    <div class="telefono">
                        <label>Teléfono </label>
                        <input class="input-text" type="tel" placeholder="Teléfono ">
                    </div>

                    <div class="mensaje">
                        <label>Mensaje</label>
                        <textarea class="input-text" placeholder="Déjanos un mensaje para atenderte mejor"></textarea>
                    </div>
                </div>
                <div class="contenedor-boton">
                    <button class="boton">Enviar</button>
                </div>
            </fieldset>
        </form>
    </main>
